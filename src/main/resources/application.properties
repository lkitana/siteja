# =====================================================================
# Si-Teja application config
# =====================================================================
server.port=8080
spring.application.name=si-teja-engine

# Pretty JSON in Postman/browser responses
spring.jackson.serialization.indent-output=true

# ---------------------------------------------------------------------
# MySQL datasource
# Values are read from environment variables with sensible local
# defaults, so no credential is hardcoded in this file. Override via
# environment variables (DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD)
# for any environment other than local development.
# ---------------------------------------------------------------------
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:siteja}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---------------------------------------------------------------------
# JPA / Hibernate
# ddl-auto=validate: Hibernate never creates/alters tables itself —
# schema changes are owned exclusively by Flyway migrations below. This
# keeps the database schema versioned and reproducible instead of
# "whatever Hibernate happened to infer from the entities".
# ---------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false

# ---------------------------------------------------------------------
# Flyway — versioned SQL migrations (schema + seed data)
# Migration files live in src/main/resources/db/migration
# ---------------------------------------------------------------------
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
